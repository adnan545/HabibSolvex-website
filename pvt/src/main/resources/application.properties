# =============================================
# SERVER CONFIGURATION - CRITICAL FOR VERCEL
# =============================================
# Vercel provides PORT environment variable
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# =============================================
# DATABASE (H2 for Development)
# =============================================
spring.datasource.url=jdbc:h2:mem:habibdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================
# EMAIL CONFIGURATION
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=habibsolvex@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# APP SETTINGS
# =============================================
app.email.to=habibsolvex@gmail.com
app.email.cc=habibsolvex@gmail.com

# =============================================
# LOGGING
# =============================================
logging.level.org.springframework=INFO
logging.level.com.habibsolvex=DEBUG